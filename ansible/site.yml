---
# Single entry-point playbook for KOSATKA Mesh.
#
#   ansible-playbook -i inventory/hosts.yml site.yml
#
# Hosts in the `master` group become the control-plane; hosts in `nodes`
# install the agent plus whichever VPN provider is declared by
# `kosatka_provider_type` (awg / wireguard / marzban / xray).

- name: Base hardening and Docker install on every host
  hosts: all
  become: true
  roles:
    - common
    - security

- name: Setup HTTPS Proxy for all nodes
  hosts: all
  become: true
  vars:
    # node_domain can be overridden per host, or calculated from name + base_domain
    node_domain: "{{ inventory_hostname }}.{{ base_domain | default('example.com') }}"
  roles:
    - role: proxy
      when: use_https | default(false) | bool

- name: Deploy KOSATKA master
  hosts: master
  become: true
  roles:
    - master

# `all:!master` targets every host except those in the `master` group.
# The `:all` union (instead of plain `nodes`) lets `install.sh` drive the
# same playbook with `-i localhost, -c local` — localhost lives in `all`
# but is not a member of `nodes`, and we must not require the operator
# to declare a full inventory on a single-box install. The `!master`
# exclusion keeps AmneziaWG/WireGuard/Marzban/agent from ever being
# layered on top of the control plane in multi-host deployments.

- name: Install AmneziaWG on nodes that declare it
  hosts: all:!master
  become: true
  roles:
    - role: awg
      when: (kosatka_provider_type | default('awg')) in ['awg', 'amneziawg']

- name: Install vanilla WireGuard on nodes that declare it
  hosts: all:!master
  become: true
  roles:
    - role: wireguard
      when: (kosatka_provider_type | default('')) == 'wireguard'

- name: Install Marzban on nodes that declare it
  hosts: all:!master
  become: true
  roles:
    - role: marzban
      when: (kosatka_provider_type | default('')) == 'marzban'

- name: Deploy the KOSATKA agent on every node and register it
  hosts: all:!master
  become: true
  roles:
    - agent
