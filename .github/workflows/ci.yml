name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Linters and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Linters
        run: |
          uv run isort --check-only .
          uv run black --check .
          uv run flake8 master agent sdk cli

      - name: Run Tests
        run: |
          uv run pytest master/tests agent/tests sdk/tests cli/tests --cov=master/kosatka_master --cov=agent/kosatka_agent --cov=cli/kosatka_cli --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  test-ui:
    name: UI Linters and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build UI
        run: npm run build

      - name: Performance Audit (Lighthouse)
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun

  performance-gate:
    name: Performance and Load Tests
    needs: [test-backend, test-ui]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Performance Gate
        run: ./tests/performance/run_perf.sh

  build-and-push:
    name: Build and Push Docker Images
    needs: [test-backend, test-ui, performance-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Master
        id: meta-master
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-master
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Master image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: master/Dockerfile
          push: true
          tags: ${{ steps.meta-master.outputs.tags }}
          labels: ${{ steps.meta-master.outputs.labels }}

      - name: Extract metadata (tags, labels) for Agent
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/Dockerfile
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
